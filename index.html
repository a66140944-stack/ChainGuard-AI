<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f7fb;
        }

        .calculator {
            width: min(360px, 100%);
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 18px 40px rgba(0,0,0,0.12);
            padding: 24px;
        }

        .calculator h1 {
            margin: 0 0 16px;
            font-size: 24px;
            text-align: center;
            color: #1f2937;
        }

        .display {
            width: 100%;
            background: #eef2ff;
            border-radius: 18px;
            padding: 20px;
            text-align: right;
            font-size: 36px;
            color: #111827;
            box-sizing: border-box;
            margin-bottom: 16px;
            min-height: 80px;
            word-break: break-all;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            border: none;
            border-radius: 16px;
            padding: 18px 0;
            font-size: 20px;
            cursor: pointer;
            transition: transform 0.1s ease, background 0.2s ease;
            background: #e2e8f0;
            color: #1f2937;
            box-shadow: inset 0 -2px 0 rgba(0,0,0,0.08);
        }

        button.operator {
            background: #4f46e5;
            color: white;
        }

        button.ac {
            background: #ef4444;
            color: white;
        }

        button.equal {
            background: #10b981;
            color: white;
            grid-column: span 2;
        }

        button:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>
    <div class="calculator">
        <h1>Simple Calculator</h1>
        <div id="display" class="display">0</div>
        <div class="buttons">
            <button class="ac" data-action="clear">AC</button>
            <button data-action="delete">DEL</button>
            <button class="operator" data-value="%">%</button>
            <button class="operator" data-value="/">÷</button>

            <button data-value="7">7</button>
            <button data-value="8">8</button>
            <button data-value="9">9</button>
            <button class="operator" data-value="*">×</button>

            <button data-value="4">4</button>
            <button data-value="5">5</button>
            <button data-value="6">6</button>
            <button class="operator" data-value="-">−</button>

            <button data-value="1">1</button>
            <button data-value="2">2</button>
            <button data-value="3">3</button>
            <button class="operator" data-value="+">+</button>

            <button data-value="0">0</button>
            <button data-value=".">.</button>
            <button class="equal" data-action="calculate">=</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        let currentInput = '0';
        let lastInput = '';
        let operatorActive = false;

        function updateDisplay() {
            display.textContent = currentInput;
        }

        function clearAll() {
            currentInput = '0';
            lastInput = '';
            operatorActive = false;
            updateDisplay();
        }

        function deleteLast() {
            if (currentInput.length === 1 || currentInput === 'Error') {
                currentInput = '0';
            } else {
                currentInput = currentInput.slice(0, -1);
            }
            updateDisplay();
        }

        function appendValue(value) {
            if (currentInput === 'Error') {
                currentInput = value === '.' ? '0.' : value;
                operatorActive = false;
                updateDisplay();
                return;
            }

            if (value === '.') {
                if (currentInput.includes('.')) return;
                currentInput += '.';
            } else {
                if (currentInput === '0' || operatorActive) {
                    currentInput = value;
                } else {
                    currentInput += value;
                }
            }
            operatorActive = false;
            updateDisplay();
        }

        function appendOperator(operator) {
            if (currentInput === 'Error') return;

            const lastChar = currentInput.slice(-1);
            if ('+-*/%'.includes(lastChar)) {
                currentInput = currentInput.slice(0, -1) + operator;
            } else {
                currentInput += operator;
            }
            operatorActive = true;
            updateDisplay();
        }

        function calculate() {
            try {
                const expression = currentInput.replace(/÷/g, '/').replace(/×/g, '*').replace(/−/g, '-');
                const result = Function(`return ${expression}`)();
                currentInput = Number.isFinite(result) ? String(result) : 'Error';
            } catch (error) {
                currentInput = 'Error';
            }
            operatorActive = false;
            updateDisplay();
        }

        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('click', () => {
                const value = button.dataset.value;
                const action = button.dataset.action;

                if (action === 'clear') {
                    clearAll();
                    return;
                }

                if (action === 'delete') {
                    deleteLast();
                    return;
                }

                if (action === 'calculate') {
                    calculate();
                    return;
                }

                if (value === '+' || value === '-' || value === '*' || value === '/' || value === '%') {
                    appendOperator(value);
                    return;
                }

                appendValue(value);
            });
        });

        updateDisplay();
    </script>
</body>
</html>
